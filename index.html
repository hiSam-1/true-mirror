<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('photo-canvas');
    const captureBtn = document.getElementById('capture-btn');
    const uploadBtn = document.getElementById('upload-btn');
    
    // ⚠️ 记得确保这里换成了你自己的 Hugging Face 地址（末尾不要带 / ）
    const HF_SPACE_URL = 'https://sam1qiu-mirror-backend.hf.space'; 

    let localStream = null;

    // 启动摄像头（升级版：自适应分辨率 + 多设备兼容）
    async function startCamera() {
        // 兼容旧版浏览器的写法
        if (navigator.mediaDevices === undefined) {
            navigator.mediaDevices = {};
        }
        if (navigator.mediaDevices.getUserMedia === undefined) {
            navigator.mediaDevices.getUserMedia = function(constraints) {
                var getUserMedia = navigator.webkitGetUserMedia || navigator.mozGetUserMedia;
                if (!getUserMedia) {
                    return Promise.reject(new Error('您的浏览器不支持调用摄像头，请更换 Chrome 或 Safari 浏览器'));
                }
                return new Promise(function(resolve, reject) {
                    getUserMedia.call(navigator, constraints, resolve, reject);
                });
            }
        }

        const constraints = { 
            // ideal 表示“理想状态”，如果手机达不到，会自动降低分辨率，不会直接死机
            video: { 
                width: { ideal: 1280 }, 
                height: { ideal: 720 },
                facingMode: "user" // 优先调用前置摄像头
            }, 
            audio: false 
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            localStream = stream;
            video.srcObject = stream;
            
            // 【关键步骤】确保在 iOS 微信或 Safari 中能自动播放
            video.setAttribute('playsinline', true);
            video.setAttribute('webkit-playsinline', true);
            video.muted = true; // 静音以允许自动播放
            
            video.play().catch(e => console.log("播放被拦截:", e));
        } catch (err) {
            console.error("摄像头初始化失败:", err);
            alert("摄像头开启失败，可能原因：\n1. 未授予网页摄像头权限；\n2. 摄像头正被微信或其他APP占用；\n3. 硬件不支持。 \n\n报错信息: " + err.message);
        }
    }

    // 拍照动作（升级版：加入强制兜底尺寸）
    captureBtn.addEventListener('click', () => {
        if (!localStream) {
            alert("摄像头还没准备好，请刷新页面并允许权限。");
            return;
        }

        // 获取视频的实际播放宽高，如果获取不到，用 640x480 兜底
        const w = video.videoWidth || 640;
        const h = video.videoHeight || 480;
        
        canvas.width = w;
        canvas.height = h;
        
        const ctx = canvas.getContext('2d');
        
        try {
            // 抓取当前视频画面
            ctx.drawImage(video, 0, 0, w, h);
            
            // 拍照成功反馈
            uploadBtn.style.display = 'inline-block';
            uploadBtn.innerText = '☁️ 保存到云端';
            uploadBtn.disabled = false;
            captureBtn.innerText = '🔄 重新拍摄';
            
            // 闪烁一下提示拍照成功
            video.style.opacity = 0.5;
            setTimeout(() => video.style.opacity = 1, 150);
            
        } catch (e) {
            alert("抓取画面失败: " + e.message);
        }
    });

    // 上传到云端
    uploadBtn.addEventListener('click', () => {
        uploadBtn.innerText = '⚡ 正在同步至云端...';
        uploadBtn.disabled = true;

        canvas.toBlob((blob) => {
            if (!blob) return alert("图片生成失败");

            const formData = new FormData();
            formData.append('image', blob, 'capture.jpg');

            fetch(`${HF_SPACE_URL}/upload`, {
                method: 'POST',
                body: formData
            })
            .then(res => {
                if(!res.ok) throw new Error('云端服务器响应失败，可能正在休眠');
                return res.json();
            })
            .then(data => {
                if (data.success) {
                    uploadBtn.innerText = '✅ 保存成功';
                    const finalImgUrl = HF_SPACE_URL + data.imageUrl;
                    alert(`照片已成功上云！\n可在新窗口打开链接查看：\n\n${finalImgUrl}`);
                    window.open(finalImgUrl, '_blank'); 
                } else {
                    throw new Error(data.message || '上传失败');
                }
            })
            .catch(err => {
                console.error(err);
                alert("上传失败！\n提示：如果 Hugging Face 超过48小时无人访问会进入休眠，请先去你的 Hugging Face Space 页面看它是否正在「Building」或「Awaking」，等它变成绿色的 Running 就可以正常上传了。");
                uploadBtn.innerText = '❌ 重试上传';
                uploadBtn.disabled = false;
            });
        }, 'image/jpeg', 0.85);
    });

    // 自动运行摄像头
    window.addEventListener('DOMContentLoaded', startCamera);
</script>
